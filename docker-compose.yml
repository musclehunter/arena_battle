services:
  app:
    build:
      context: ./docker/php
    container_name: arena_app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      # Laravel 側の .env が優先だが、未設定時のフォールバックとして置く
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: arena
      DB_USERNAME: arena
      DB_PASSWORD: arena
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - arena_net

  web:
    image: nginx:1.27-alpine
    container_name: arena_web
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - arena_net

  vite:
    build:
      context: ./docker/php
    container_name: arena_vite
    working_dir: /var/www/html
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0; else echo 'package.json not found. Skip.' && tail -f /dev/null; fi"
    ports:
      - "5173:5173"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
    networks:
      - arena_net

  db:
    image: mysql:8.0
    container_name: arena_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: arena
      MYSQL_USER: arena
      MYSQL_PASSWORD: arena
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - arena_net

  redis:
    image: redis:7-alpine
    container_name: arena_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arena_net

volumes:
  db_data:
  redis_data:

networks:
  arena_net:
    driver: bridge
